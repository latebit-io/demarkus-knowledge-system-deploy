# Demarkus worlds. One Argo Application per entry in
# generators[0].list.elements; each installs the demarkus-server chart
# into its own namespace.
#
# Pattern from deploy/k8s/examples/applicationset.yaml in the demarkus
# monorepo. Per-world isolation via namespace boundary; per-world
# RBAC for the broker is provisioned by the broker chart's worlds[]
# list (see apps/demarkus-broker/application.yaml).
#
# Sync wave: 1 (per bootstrap/root-appset.yaml). Runs in parallel with
# the broker Application — the broker's per-world Role+RoleBinding apply
# may race world-a's namespace creation on first sync, but Argo retries
# until both converge.
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: demarkus-worlds
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  generators:
    - list:
        elements:
          - name: world-a
  template:
    metadata:
      name: "{{name}}"
    spec:
      project: default
      source:
        repoURL: ghcr.io/latebit-io/charts
        chart: demarkus-server
        targetRevision: 0.17.14
        helm:
          releaseName: "{{name}}"
          values: |
            # Explicit image.tag pin as a defensive guard against an
            # unexpected chart bump. 0.17.14 fixes the volumeClaimTemplates
            # volumeMode drift (chart now renders `volumeMode: Filesystem`
            # to match what k8s defaults onto the live PVC; PR #170). This
            # specific bump IS an immutable-field change vs 0.17.13 (null →
            # Filesystem), so the apps-immutable-check guard flags it and the
            # one-time rollout needs `kubectl delete statefulset <world>
            # --cascade=orphan` (pod + PVC survive) — see
            # docs/runbook-world-version-bump.md. After this, render == live
            # and future server bumps apply cleanly with no orphan-delete.
            image:
              tag: "0.17.14"
            # fullnameOverride pins every chart-rendered resource name
            # to the bare world name (Service, StatefulSet, tokens
            # Secret, ServiceAccount) instead of the chart's default
            # `<releaseName>-demarkus-server` suffix. With Service name
            # == world name, the broker's MCP gateway's default DNS
            # lookup `<worldName>.<namespace>.svc.cluster.local:6309`
            # resolves cleanly and no per-world internalAddress
            # override is needed. Future worlds added via this
            # ApplicationSet inherit the same convention.
            fullnameOverride: "{{name}}"
            # ClusterIP service — the broker reaches each world via the
            # standard in-cluster Service DNS (`{name}.{name}.svc.
            # cluster.local:6309`), no external mark:// exposure yet.
            service:
              type: ClusterIP
            storage:
              size: 1Gi
            # Bootstrap admin token publish-only for the same reason the
            # broker's defaultToken.operations is publish-only (see
            # apps/demarkus-broker/application.yaml). Any token with
            # `read` in operations flips the world into
            # read-auth-required mode, which breaks the broker's
            # empty-bearer reads. The chart's bootstrap Job writes this
            # admin token into the world's tokens.toml once at install
            # time; making it publish-only keeps the read surface public
            # so the broker can proxy reads without a token.
            tokens:
              admin:
                operations: ["publish"]
            # TLS — Mark Protocol speaks QUIC, so TLS is mandatory.
            # Without this block the chart falls into the dev-mode
            # self-signed cert path with SAN=localhost only, which the
            # broker rejects when it dials the cluster Service DNS.
            #
            # The `selfsigned` ClusterIssuer (from
            # platform/cert-manager/cluster-issuers.yaml) is the right
            # issuer for in-cluster .svc.cluster.local names —
            # Let's Encrypt cannot validate those over HTTP-01.
            # dnsNames defaults to `<release>.<namespace>.svc.cluster.
            # local` per the chart, which resolves to
            # `{{name}}.{{name}}.svc.cluster.local` here — exactly the
            # host the broker's MCP gateway dials.
            tls:
              certManager:
                enabled: true
                issuerRef:
                  kind: ClusterIssuer
                  name: selfsigned
      destination:
        server: https://kubernetes.default.svc
        namespace: "{{name}}"
      # The world's tokens Secret holds runtime state — the broker
      # appends per-mint hash entries to data.tokens.toml on each token
      # mint. Without ignoring /data, Argo's selfHeal would revert every
      # mint immediately back to the chart-rendered admin-only contents.
      #
      # NOTE: a former `/spec/volumeClaimTemplates` ignore on the
      # StatefulSet was removed once demarkus-server 0.17.14 began
      # rendering `volumeMode: Filesystem` to match the k8s server-side
      # default (monorepo PR #170). Before that, the render (volumeMode
      # null) drifted from the live PVC (Filesystem) and the ignore hid
      # it — but on an immutable field, the ignore plus ServerSideDiff
      # actually caused a ComparisonError of its own (the dry-run stripped
      # the VCT, orphaning the `content` volumeMount). With render == live
      # the VCT no longer drifts, so the ignore is unnecessary and the
      # whole class of immutable-VCT sync wedges goes away.
      ignoreDifferences:
        - kind: Secret
          name: "{{name}}-tokens"
          jsonPointers:
            - /data
      syncPolicy:
        # Stamp the backup label on every world namespace Argo creates, so the
        # backups CronJob (apps/backups) snapshots each world's content PVC.
        # New worlds inherit this automatically — zero per-world backup config.
        managedNamespaceMetadata:
          labels:
            demarkus.io/backup: "true"
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
          - ServerSideApply=true
          # RespectIgnoreDifferences was removed alongside the VCT ignore
          # above: it only existed to keep the ignored, immutable VCT out
          # of the ServerSideApply payload. With demarkus-server 0.17.14
          # rendering volumeMode to match live (no VCT drift), there is
          # nothing left to respect, and dropping it lets ServerSideDiff
          # compute a clean diff again.
