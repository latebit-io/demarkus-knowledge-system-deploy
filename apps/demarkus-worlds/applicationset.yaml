# Demarkus worlds. One Argo Application per entry in deployment.yaml's
# worlds[]; each installs the demarkus-server chart into its own namespace.
# deployment.yaml is the single source — the same list drives the broker's
# worlds[] and the agent's crawl seeds, so adding a world is one edit there.
#
# Pattern from deploy/k8s/examples/applicationset.yaml in the demarkus
# monorepo. Per-world isolation via namespace boundary; per-world
# RBAC for the broker is provisioned by the broker chart's worlds[]
# list (see apps/demarkus-broker/application.yaml).
#
# Sync wave: 1 (per bootstrap/root-appset.yaml). Runs in parallel with
# the broker Application — the broker's per-world Role+RoleBinding apply
# may race world-a's namespace creation on first sync, but Argo retries
# until both converge.
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: demarkus-worlds
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  goTemplate: true
  # Only .name is interpolated (present on every world), so missingkey=error
  # is safe and catches template typos.
  goTemplateOptions: ["missingkey=error"]
  # The matrix feeds the git-files generator's parsed deployment.yaml into a
  # list generator whose elementsYaml expands worlds[] into one param-set per
  # world — the stock ArgoCD way to fan a single in-file array out to N
  # Applications (no plugin). Which world is the `root` hub, etc. is declared
  # in deployment.yaml; here every world gets identical demarkus-server config.
  generators:
    - matrix:
        generators:
          - git:
              # Self-reference literal (a generator can't read its own repo URL
              # from the file it reads); same as deployment.yaml's repoURL.
              repoURL: https://github.com/latebit-io/demarkus-knowledge-system-deploy.git
              revision: main
              files:
                - path: deployment.yaml
          - list:
              elementsYaml: "{{ .worlds | toJson }}"
  template:
    metadata:
      name: "{{ .name }}"
    spec:
      project: default
      source:
        repoURL: ghcr.io/latebit-io/charts
        chart: demarkus-server
        targetRevision: 0.19.0
        helm:
          releaseName: "{{ .name }}"
          values: |
            # Explicit image.tag pin as a defensive guard against an
            # unexpected chart bump. 0.17.17 adds the LOOKUP match-all query
            # `*` (whole catalog under scope, importance order; commit
            # b8aedb7) — the data source the library's universe floor reads
            # per world. 0.17.18 makes volumeClaimTemplates carry only the
            # stable selectorLabels (name + instance) instead of the full
            # label set, whose `helm.sh/chart` + `app.kubernetes.io/version`
            # churned every bump and trapped each one as a forbidden in-place
            # VCT update. We bump straight to 0.17.18 (skipping .17) so the
            # recreate below is the LAST one ever — after it the VCT is
            # byte-stable across versions and future bumps apply cleanly.
            #
            # ONE-TIME recreate (the full→stable VCT-label change is itself an
            # immutable diff; non-destructive, pod + PVC survive), per world —
            # root and world-a — see docs/runbook-world-version-bump.md:
            #   kubectl delete statefulset <world> -n <ns> --cascade=orphan
            #   kubectl -n argocd annotate application <world> \
            #     argocd.argoproj.io/refresh=hard --overwrite
            #
            # 0.17.19 moves token-Secret ownership out of the chart: a
            # pre-install/pre-upgrade bootstrap Job creates <world>-tokens +
            # <world>-token-values atomically and hands off, so a GitOps
            # controller never reconciles (and corrupts) the runtime-mutated
            # tokens.toml. Existing keep-annotated Secrets are left intact;
            # repairing the already-diverged `root` pair is a one-time delete
            # (the Job recreates them consistently) — see the rollout notes.
            #
            # 0.18.0 brings Open Knowledge Format (OKF) compatibility: the
            # server defaults `type: Document` on publish/append for untyped
            # docs (typed OKF concepts by construction) and stores recognized
            # OKF fields as bare frontmatter. No StatefulSet/VCT change expected
            # — apps-immutable-check gates it; if it flags a diff, recreate per
            # the runbook.
            #
            # 0.19.0 (monorepo #224) hides archived documents from LIST by
            # default and prunes directories whose whole subtree is archived;
            # `include_archived` on mark_list restores the audit view (needs
            # broker chart >= 0.4.0 to expose the tool arg through the MCP
            # gateway). Pure handler/store change — no StatefulSet/VCT diff
            # expected.
            image:
              tag: "0.19.0"
            # fullnameOverride pins every chart-rendered resource name
            # to the bare world name (Service, StatefulSet, tokens
            # Secret, ServiceAccount) instead of the chart's default
            # `<releaseName>-demarkus-server` suffix. With Service name
            # == world name, the broker's MCP gateway's default DNS
            # lookup `<worldName>.<namespace>.svc.cluster.local:6309`
            # resolves cleanly and no per-world internalAddress
            # override is needed. Future worlds added via this
            # ApplicationSet inherit the same convention.
            fullnameOverride: "{{ .name }}"
            # ClusterIP service — the broker reaches each world via the
            # standard in-cluster Service DNS (`{name}.{name}.svc.
            # cluster.local:6309`), no external mark:// exposure yet.
            service:
              type: ClusterIP
            storage:
              size: 1Gi
            # Bootstrap admin token publish-only for the same reason the
            # broker's defaultToken.operations is publish-only (see
            # apps/demarkus-broker/application.yaml). Any token with
            # `read` in operations flips the world into
            # read-auth-required mode, which breaks the broker's
            # empty-bearer reads. The chart's bootstrap Job writes this
            # admin token into the world's tokens.toml once at install
            # time; making it publish-only keeps the read surface public
            # so the broker can proxy reads without a token.
            tokens:
              admin:
                operations: ["publish"]
                # Recursive write path (chart default is `/*`, root-level
                # only). The federation agent (apps/demarkus-agent) reuses
                # this raw admin token to publish its hash index under
                # `/index/<host>.md` on the `root` hub — a subpath that `/*`
                # would reject (Go path.Match treats `/` as a separator). `/**`
                # is recursive. Harmless for the other worlds: nothing
                # publishes with their admin token directly (the broker mints
                # its own `/**` write token), and operations stays
                # publish-only so the read surface remains public.
                paths: ["/**"]
            # TLS — Mark Protocol speaks QUIC, so TLS is mandatory.
            # Without this block the chart falls into the dev-mode
            # self-signed cert path with SAN=localhost only, which the
            # broker rejects when it dials the cluster Service DNS.
            #
            # The `selfsigned` ClusterIssuer (from
            # platform/cert-manager/cluster-issuers.yaml) is the right
            # issuer for in-cluster .svc.cluster.local names —
            # Let's Encrypt cannot validate those over HTTP-01.
            # dnsNames defaults to `<release>.<namespace>.svc.cluster.
            # local` per the chart, which resolves to
            # `<name>.<name>.svc.cluster.local` here — exactly the
            # host the broker's MCP gateway dials.
            tls:
              certManager:
                enabled: true
                issuerRef:
                  kind: ClusterIssuer
                  name: selfsigned
      destination:
        server: https://kubernetes.default.svc
        namespace: "{{ .name }}"
      # The world's tokens Secret holds runtime state — the broker
      # appends per-mint hash entries to data.tokens.toml on each token
      # mint. Without ignoring /data, Argo's selfHeal would revert every
      # mint immediately back to the chart-rendered admin-only contents.
      #
      # NOTE: a former `/spec/volumeClaimTemplates` ignore on the
      # StatefulSet was removed once demarkus-server 0.17.14 began
      # rendering `volumeMode: Filesystem` to match the k8s server-side
      # default (monorepo PR #170). Before that, the render (volumeMode
      # null) drifted from the live PVC (Filesystem) and the ignore hid
      # it — but on an immutable field, the ignore plus ServerSideDiff
      # actually caused a ComparisonError of its own (the dry-run stripped
      # the VCT, orphaning the `content` volumeMount). With render == live
      # the VCT no longer drifts, so the ignore is unnecessary and the
      # whole class of immutable-VCT sync wedges goes away.
      ignoreDifferences:
        - kind: Secret
          name: "{{ .name }}-tokens"
          jsonPointers:
            - /data
      syncPolicy:
        # Stamp the backup label on every world namespace Argo creates, so the
        # backups CronJob (apps/backups) snapshots each world's content PVC.
        # New worlds inherit this automatically — zero per-world backup config.
        managedNamespaceMetadata:
          labels:
            demarkus.io/backup: "true"
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
          - ServerSideApply=true
          # RespectIgnoreDifferences was removed alongside the VCT ignore
          # above: it only existed to keep the ignored, immutable VCT out
          # of the ServerSideApply payload. With demarkus-server 0.17.14
          # rendering volumeMode to match live (no VCT drift), there is
          # nothing left to respect, and dropping it lets ServerSideDiff
          # compute a clean diff again.
