# demarkus-broker: OIDC token broker + MCP gateway.
#
# Two HTTP listeners on one pod:
#   - Management API (port 8080) — OIDC discovery, /auth/callback,
#     /device/*, /tokens. Fronted at broker.knowledge.demarkus.io.
#   - MCP gateway (port 8081) — /mcp + RFC 9728 + RFC 8414 OAuth
#     metadata. Fronted at knowledge.demarkus.io (user-facing; the
#     Claude Code plugin's /knowledge-join targets this host).
#
# Secrets bridge from OpenBao via ESO (Phase 7b):
#   - oidc-client Secret      → OIDC_CLIENT_SECRET env on the pod
#   - jwks-signing-key Secret → BROKER_SIGNING_KEY env on the pod
#
# Sync wave: 1 (per bootstrap/root-appset.yaml). Cluster prerequisites
# (cert-manager, openbao, ESO, ingress-nginx, external-dns) all live in
# earlier waves and must be healthy first.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: demarkus-broker
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  project: default
  source:
    repoURL: ghcr.io/latebit-io/charts
    chart: demarkus-broker
    targetRevision: 0.1.28
    helm:
      releaseName: demarkus-broker
      values: |
        # Single replica until the broker has shared state for the
        # in-memory deviceStore + authCodeStore. With N>=2 the OAuth
        # callback can land on a different pod than /device/authorize
        # did and fail with "authorization session expired" because the
        # device_code lives only in the originating pod's memory. The
        # signed state cookie is replica-agnostic (HMAC keyed off a
        # shared secret), but the device/auth-code stores aren't.
        # Revisit when upstream broker grows a Secret-backed store.
        replicaCount: 1

        # Image tag defaults to .Chart.appVersion (0.1.28, which now
        # equals the chart version); explicit pin so an unexpected chart
        # bump can't pull in a controller newer than what was reviewed
        # here. 0.1.27+ allows the LOOKUP read verb through the MCP
        # gateway (server-side catalog query); 0.1.28 is the latest patch.
        image:
          tag: "0.1.28"

        server:
          # Management API base URL. Advertised as `issuer` in
          # /.well-known/openid-configuration on BOTH listeners —
          # clients fetching the MCP listener's RFC 8414 metadata on
          # knowledge.demarkus.io will see this as the issuer and follow
          # back to broker.* for the OAuth leg, then return to
          # knowledge.demarkus.io/mcp with a bearer.
          publicURL: "https://broker.knowledge.demarkus.io"
          # cookieKey blank → chart generates a fresh 32-byte HMAC key
          # on first install and preserves it via `lookup` on the
          # config Secret across upgrades.
          cookieKey: ""

          # MCP gateway first-mint retry budget. Chart defaults
          # (6 attempts, max 8s backoff) total ~16s — observed on
          # this cluster to fall ~1s short of kubelet's Secret-volume
          # propagation lag after world-a-tokens was re-bootstrapped,
          # so the first publish following a world Secret recreate
          # failed with "broker: world X rejected write token after N
          # attempts." Tuned up here until the chart's defaults catch
          # up upstream. Total budget: 250ms+500ms+1s+2s+4s+8s+
          # 15s+15s+15s+15s ≈ 76s, comfortably past kubelet's worst-
          # case syncFrequency (60s).
          mcp:
            firstMintMaxAttempts: 10
            firstMintMaxBackoff: 15s

        oidc:
          issuer: "https://accounts.google.com"
          # client_id is a public identifier — Google embeds it in the
          # OAuth redirect URL any browser sees during login. Safe to
          # commit. The matching client_secret is in OpenBao and arrives
          # via the existingSecretRef below.
          clientID: "941447371620-ihfmbrgip3dlaunqaa7e8675uoh6fs7v.apps.googleusercontent.com"
          # clientSecret + brokerSigningKey come from ESO-materialized
          # k8s Secrets (Phase 7b). The chart reads the env-var override
          # path (OIDC_CLIENT_SECRET, BROKER_SIGNING_KEY) so the values
          # never round-trip through helm release history.
          existingSecretRef:
            name: oidc-client
            # key defaults to "clientSecret" — matches the ExternalSecret
            # target in apps/demarkus-broker/external-secrets.yaml.
          existingSigningKeyRef:
            name: jwks-signing-key
            # key defaults to "signing-key.pem".
          redirectURL: "https://broker.knowledge.demarkus.io/auth/callback"

        # First world. Wired here at install time so the broker boots
        # with a valid config (the binary refuses to start with empty
        # worlds[]). The world's namespace + tokens Secret are
        # provisioned by apps/demarkus-worlds/applicationset.yaml; the
        # per-world Role+RoleBinding in this chart needs that namespace
        # to exist, so the two top-level Applications self-heal into
        # convergence when world-a lands.
        worlds:
          - name: world-a
            namespace: world-a
            tokensSecret: world-a-tokens
            # No publicURL — world is reachable through the broker's MCP
            # gateway, not via mark:// directly. /me/install will omit
            # this world from its response (no address to hand to a
            # mark:// client). Adding it later requires a publicly-
            # routable mark:// endpoint (LoadBalancer or QUIC ingress).
            allow:
              # Test-user allowlist while the Google OAuth consent
              # screen is in Testing mode. Both addresses are Fritz's;
              # listing both means a sign-in from either account
              # completes the world-mint step. Broaden once the consent
              # screen is published and more real users need access.
              emails:
                - fritz@latebit.io
                - fredrick.seitz@gmail.com
            defaultToken:
              # `paths` is the ONLY knob as of chart 0.1.26 (#165).
              # `/**` is recursive; `/*` would limit the broker's
              # write token to root-level paths only because Go's
              # path.Match treats `*` as "any sequence of
              # non-Separator chars" — so `/*` matches `/foo.md` but
              # rejects `/sub/foo.md`. World servers use this Go
              # matcher (server/internal/auth/auth.go:matchPath); the
              # broker needs `/**` to write into any non-trivial
              # document tree.
              #
              # operations + expiresAfter are gone: the broker now
              # hardcodes the write token to ["publish"] in
              # worldWriteTokenStore.Provision (#163) so an open-reads
              # regression can't slip back in via config, and the
              # write token is long-lived by design (reads use no
              # token). The world stays publicly-readable; the broker
              # proxies reads with an empty bearer.
              paths: ["/**"]

        ingress:
          enabled: true
          className: nginx
          # Management API — receives Google's OAuth redirect at
          # /auth/callback; serves OIDC discovery + token endpoints.
          host: broker.knowledge.demarkus.io
          tls:
            certManager:
              enabled: true
              issuerRef:
                kind: ClusterIssuer
                name: letsencrypt-prod
          # MCP gateway — user-facing hostname. /knowledge-join from
          # the Claude Code plugin discovers OAuth metadata here, then
          # follows back to the management host for the device flow.
          mcp:
            host: knowledge.demarkus.io
            tls:
              certManager:
                enabled: true
                issuerRef:
                  kind: ClusterIssuer
                  name: letsencrypt-prod

        # Broker → world QUIC dial posture. Each world's cert is
        # issued by the `selfsigned` ClusterIssuer (no shared CA the
        # broker can trust), so strict TLS chain verification fails
        # with "signed by unknown authority". Skip-verify is the
        # in-cluster trust model: QUIC still encrypts on the wire,
        # and NetworkPolicy + cluster RBAC do the real isolation.
        # Flip back to false once a shared CA Issuer + broker-side
        # caBundle config is wired.
        worldDialer:
          insecureSkipVerify: true

        # rbac.create stays true (default) so the chart provisions the
        # broker-namespace Role for the sweeper Lease + refresh-tokens
        # Secret (the issuance subsystem was retired in #164 — per-world
        # tokens are the single source of truth now) AND the per-world
        # Role+RoleBinding in world-a's namespace.
        # NetworkPolicy default fits this cluster (ingress-nginx in
        # `ingress-nginx` ns). PDB minAvailable=1 with 2 replicas.
  destination:
    server: https://kubernetes.default.svc
    namespace: demarkus-broker
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
      # Lets the per-world RBAC apply retry while world-a's namespace is
      # still being created by the sibling Application — no false sync
      # failure on the initial bring-up race.
      - SkipDryRunOnMissingResource=true
