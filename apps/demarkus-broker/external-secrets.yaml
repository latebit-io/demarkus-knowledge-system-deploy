# ExternalSecret resources that materialize broker secrets from OpenBao
# into native k8s Secrets in the demarkus-broker namespace. The
# demarkus-broker helm chart (Phase 7c) consumes these via the chart's
# `oidc.existingSecretRef` + `oidc.existingSigningKeyRef` knobs, which
# render `secretKeyRef`-shaped env (`OIDC_CLIENT_SECRET`,
# `BROKER_SIGNING_KEY`) on the broker pod.
#
# Key naming matches the chart's defaults so values-prod.yaml only has
# to set `existingSecretRef.name` — the `.key` fields stay defaulted.
#
# refreshInterval: 1h. Rotating a secret in OpenBao propagates to the
# k8s Secret within an hour and the broker picks it up on next pod
# restart. Tighten to e.g. 15m if faster rotation matters.
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: oidc-client
  namespace: demarkus-broker
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: openbao
    kind: ClusterSecretStore
  target:
    name: oidc-client
    creationPolicy: Owner
  data:
    # Chart default: oidc.existingSecretRef.key=clientSecret.
    - secretKey: clientSecret
      remoteRef:
        key: broker/oidc-client
        property: client_secret
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: jwks-signing-key
  namespace: demarkus-broker
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: openbao
    kind: ClusterSecretStore
  target:
    name: jwks-signing-key
    creationPolicy: Owner
  data:
    # Chart default: oidc.existingSigningKeyRef.key=signing-key.pem.
    - secretKey: signing-key.pem
      remoteRef:
        key: broker/jwks-signing-key
        property: pem
