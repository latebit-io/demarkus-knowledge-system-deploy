# ClusterSecretStore: cluster-scoped pointer at OpenBao. Cluster-scoped
# (vs SecretStore) so future apps can reuse the same store by name
# without redefining the auth wiring. Tightening to per-app SecretStores
# is a future option if cross-app isolation becomes a real need.
#
# Auth: kubernetes-auth method. ESO presents its own KSA's JWT to OpenBao
# (auth/kubernetes/login with role=external-secrets), OpenBao calls
# TokenReview against the cluster, and on success issues a short-lived
# token whose policy grants `read` on `secret/data/broker/*`.
#
# Backed by OpenBao plaintext HTTP inside the cluster — TLS-enable path
# is documented in platform/openbao/application.yaml and stays deferred
# until the wider TLS rollout. Sensitive values travel the pod network
# unencrypted until then.
apiVersion: external-secrets.io/v1
kind: ClusterSecretStore
metadata:
  name: openbao
spec:
  provider:
    vault:
      server: "http://openbao.openbao.svc:8200"
      # kv-v2 mount path. The provider prepends this to remoteRef.key
      # when calling OpenBao's /v1/secret/data/<key> endpoint.
      path: "secret"
      version: "v2"
      auth:
        kubernetes:
          # OpenBao's k8s auth method default mount path. Matches the
          # `bao auth enable kubernetes` invocation in
          # docs/runbook-openbao-seed.md.
          mountPath: "kubernetes"
          # Role created out-of-band (runbook §Step 5). Bound to ESO's
          # KSA in the external-secrets namespace; policy grants read on
          # secret/data/broker/*.
          role: "external-secrets"
          serviceAccountRef:
            name: external-secrets
            namespace: external-secrets
