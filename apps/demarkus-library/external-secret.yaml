# ExternalSecret that materializes the library's OAuth client secret from
# OpenBao into a native k8s Secret in the demarkus-library namespace. The
# demarkus-library chart consumes it via `library.broker.existingSecretRef`
# (name=library-oauth-client, key=clientSecret), which renders a secretKeyRef
# DEMARKUS_CLIENT_SECRET env on the pod.
#
# This is the PLAINTEXT half of the `library-web` webClients registration —
# the broker side (deployment.yaml) holds only the sha256. Seeding the
# OpenBao entry + widening the ESO policy to `secret/data/library/*` is a
# one-time manual step: docs/runbook-library.md.
#
# Reuses the cluster-scoped `openbao` ClusterSecretStore defined in
# apps/demarkus-broker/cluster-secret-store.yaml (cluster-scoped precisely so
# future apps could reuse it by name).
#
# refreshInterval: 1h. Rotating the secret in OpenBao (paired with a
# clientSecretHash update in deployment.yaml) propagates within the hour; the
# library picks it up on next pod restart. A mismatch window shows as
# `401 invalid_client` on token/refresh — see the rotation notes in
# docs/runbook-broker-web-clients.md.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: library-oauth-client
  namespace: demarkus-library
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: openbao
    kind: ClusterSecretStore
  target:
    name: library-oauth-client
    creationPolicy: Owner
  data:
    # Chart default: library.broker.existingSecretRef.key=clientSecret.
    - secretKey: clientSecret
      remoteRef:
        key: library/oauth-client
        property: client_secret
