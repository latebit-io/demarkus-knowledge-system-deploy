# demarkus-library: the Universe Library — server-rendered web reading room
# over the broker's MCP gateway, behind the org-login turnstile.
#
# Config-driven: this ApplicationSet's git-files generator reads the repo-root
# deployment.yaml and interpolates `domain` into the library's helm values
# (broker origin, ingress host, redirect URI). The library is the registered
# `library-web` confidential web client (deployment.yaml `webClients[]`, broker
# ADR 0001): the broker holds the sha256 of the client secret + the exact
# redirect URI; the plaintext secret reaches this pod via ESO from OpenBao
# (external-secret.yaml + docs/runbook-library.md).
#
# Topology notes:
#   - broker.url is the MCP GATEWAY origin (`https://<domain>`), NOT the
#     management host (`broker.<domain>`). The library fetches RFC 8414
#     metadata and POSTs /mcp against this one origin; the gateway's metadata
#     points authorize/token at the management host, so both listeners get
#     used without the library knowing the split.
#   - Reads ride the public https ingress (TCP 443) — the chart's default-on
#     NetworkPolicy already admits that egress, plus UDP 6309 for federation
#     link-following (direct, tokenless QUIC to hosts named by mark:// links).
#   - redirectURI must EXACTLY match the webClients entry in deployment.yaml —
#     both derive from `domain` (library.<domain>), so they move together.
#
# Sync wave: 2 — after the broker (wave 1): the library's login round trip
# and every page read need the gateway up. No hard ordering requirement (the
# pod self-heals into convergence), just first-sync tidiness.
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: demarkus-library
  namespace: argocd
spec:
  goTemplate: true
  # Fail the render on a missing deployment.yaml key rather than silently
  # emitting an empty string into a URL.
  goTemplateOptions: ["missingkey=error"]
  generators:
    - git:
        # Self-reference literal (a generator can't read its own repo URL from
        # the file it reads); same value as deployment.yaml's repoURL. revision
        # matches the root ApplicationSet.
        repoURL: https://github.com/latebit-io/demarkus-knowledge-system-deploy.git
        revision: main
        files:
          - path: deployment.yaml
  template:
    metadata:
      name: demarkus-library
      namespace: argocd
      annotations:
        argocd.argoproj.io/sync-wave: "2"
    spec:
      project: default
      source:
        repoURL: ghcr.io/latebit-io/charts
        chart: demarkus-library
        targetRevision: 0.5.1
        helm:
          releaseName: demarkus-library
          values: |
            # Explicit image pin so an unexpected chart bump can't pull a
            # newer library than reviewed. 0.1.5 was the Reading Room
            # redesign — Tufte pane (R1), trail engine (R2), and the
            # universe floor as pane zero (ADR 0005). 0.1.6 fixes the trail
            # parser rejecting world-root listing chunks ("<world>/d/"). 0.1.7
            # is R3 (PR #17): hover preview cards, the backlinks margin block,
            # and the graph neighborhood pane (kind "<world>/g/<path>"), fed by
            # a render-time observed-links map (per-pod, no broker store). 0.1.8
            # is floor enrichment (the hub-topology reader); 0.1.9 adds the
            # DEMARKUS_HUB chart mapping (library.hub below). 0.1.10 joins
            # topology-graph edges to worldName via mark_worlds' new `address`
            # column (needs broker >= 0.1.37) — cross-world edges render as
            # cluster lines instead of crawl-host portals. The floor needs
            # worlds >= 0.17.18 (LOOKUP match-all + stable VCT labels). 0.1.11
            # is the world-view zoom level (PR #21): clicking a world on the
            # floor opens its map — the catalog as directory clusters with
            # "+N more" aggregates into listing panes (trail chunk <world>/u/).
            # Reader-only: no broker/worlds/agent change (reuses mark_worlds +
            # lookup). 0.1.12 is the cataloging desk's first write slice (PR #22):
            # edit an existing document — a margin "edit" affordance opens an
            # htmx textarea + live server preview; save publishes via mark_publish
            # (metadata out of band, expected_version conflict guard) and 303s
            # back to the doc. Editing is gated on an authenticated session; the
            # broker's existing per-world write token authorizes the publish, so
            # no broker/worlds change. 0.1.13 adds the create-new-document slice
            # (PR #23): a margin "new" affordance opens the editor in create mode
            # (editable path, expected_version 0); publishes a new doc and 303s
            # to it. Same reader-only-deploy footprint (reuses the write path).
            # 0.1.14 adds the append slice (PR #24): a margin "append" affordance
            # adds content to the end of a doc via mark_append (metadata-
            # preserving, version auto-resolved). Same deploy footprint. 0.1.15
            # is R4 reader mode (PR #25): a focus overlay (?reader=<paneIndex>)
            # that centers the focused document over the dimmed trail — context
            # preserved behind, ✕/backdrop/Esc close. Web-only URL-state lens;
            # reader-only deploy footprint (no broker/worlds/agent change).
            # 0.1.16 fixes that overlay to be a pure lens (PR #26): opening
            # ?reader= no longer moves focus, so the canvas behind is unchanged
            # (reader and focus are orthogonal). Same reader-only footprint.
            # 0.1.17 TTL-caches the universe floor (PR #27): the floor's heavy
            # broker fan-out (mark_worlds + per-world lookup + hub graph) rebuilt
            # on every focus/refresh and overran the broker's per-subject rate
            # budget (see the broker rateLimit bump to 120/60). A 30s TTL + a
            # stale-cache fallback (serve last-good through a transient gateway
            # error, never on ErrUnauthorized) stop the floor from re-fanning-out.
            # 0.1.18 sends Cache-Control: private, no-store on every reading-room
            # page (PR #28): they are authed + per-session, so a shared cache (a
            # corporate forward proxy especially) must never hold one — that was
            # serving a frozen floor to a client that incognito could not bypass.
            # Static assets stay cacheable (served separately). 0.1.19 renders
            # the honest empty floor ("no worlds visible to your identity") for
            # an identity authorized for zero worlds instead of leaking world
            # names + internal addresses as portal nodes (defense-in-depth for
            # the broker mark_worlds read/write split, broker 0.1.38). 0.1.20
            # shows the signed-in identity's email in the nav (PR #31): Workspace
            # SSO silently picks the browser's default account, so a reader had
            # no way to tell which identity they were on. Web-only, reader-only
            # deploy footprint. 0.1.21 lifts a document's leading "# H1" out of
            # the body and renders it as the pane title (PR #31): the pane shows
            # the title itself, so a body opening with "# Title" was rendering a
            # double header (lowercase filename + the body H1). Now one header,
            # properly cased. Web-only, reader-only footprint. 0.2.0 adds a
            # world-map "new document" affordance (PR #33) — create the first
            # doc in an empty world from the map — and degrades a world whose
            # catalog read fails to a notice instead of 502'ing (context
            # cancellation + ErrUnauthorized still propagate). First MINOR bump:
            # the release config now regex-matches feat(scope): as minor. 0.3.0
            # is the conflict merge flow (PR #34): a stale edit no longer reloads
            # blank — the broker three-way-merges it (on_conflict=merge) and the
            # desk re-opens with the merged body, the resolve-at version, and a
            # notice (git-style markers where both sides edited the same lines).
            # Create (version 0) still uses on_conflict=fail. Reader+writer; no
            # broker/worlds/agent change (the broker already supports merge).
            # 0.3.1 adopts the strict golangci config (PR #35) — internal lint
            # only, no behavior change. 0.4.0 redesigns the sign-in page (PR #36):
            # a black-and-white dark theme with a faint full-page SVG
            # knowledge-graph backdrop (decorative, aria-hidden; the no-JS form
            # behavior is unchanged). 0.5.0 is the robustness hardening (PR #37).
            # Tier 1: CSRF on every state-changing POST (Echo's Sec-Fetch-Site
            # primary + token fallback), HTTP ReadHeader/Idle timeouts plus a 30s
            # handler ContextTimeout, a 2 MiB body limit on writes, and a
            # post-turnstile ErrUnauthorized that re-logins instead of dead-ending
            # on a 401. Tier 2: drop the single-flight mutex on dead-grant
            # teardown (an inflight-map leak), a TTL + write-invalidation on the
            # world-map cache (an unfocused map no longer serves a frozen first
            # assembly), floor/world-map cache invalidation on write so an edit
            # shows immediately, and a 5000-source LRU bound on the observed-links
            # graph. Web/core only — no broker/worlds/agent change. 0.5.1 splits
            # the ReadingService port into Reader/Graph/Map/Editor and centralizes
            # the listing-vs-document read dispatch (Open/OpenCached,
            # domain.IsListingPath) — pure refactor, no behavior change.
            image:
              tag: "0.5.1"

            # Sessions are in-memory — a reader's cookie is only valid against
            # the replica that minted it. Stay at 1 until a shared session
            # store (or sticky sessions) ships.
            replicaCount: 1

            library:
              transport: broker
              # Follow mark:// links beyond the home knowledge system —
              # anonymous, tokenless QUIC reads. The distributed graph is the
              # product; flip false to pin readers to home worlds.
              federation: true
              defaultDoc: /index.md
              # Topology source for the floor's durable edges + portal nodes
              # (DEMARKUS_HUB): the `root` hub, where the federation agent
              # publishes its graph export (/graph.md, publishGraph above).
              hub: root
              # Federation targets commonly run self-signed certs with no
              # shared CA (same posture as the broker's
              # worldDialer.insecureSkipVerify). QUIC still encrypts.
              insecure: true
              broker:
                # MCP gateway origin — serves the RFC 8414 metadata AND /mcp.
                # The metadata routes authorize/token to broker.{{ .domain }}.
                url: "https://{{ .domain }}"
                # webClients registry entry in deployment.yaml. Plain literal
                # (not templated from webClients[]) — the registry is a list
                # and this app is one specific client of it.
                clientID: library-web
                # Plaintext OAuth client secret, materialized by ESO from
                # OpenBao (secret/library/oauth-client) — external-secret.yaml.
                # Never the cleartext `clientSecret` values path.
                existingSecretRef:
                  name: library-oauth-client
                  key: clientSecret
                # Must exactly match the redirectURIs entry in
                # deployment.yaml's webClients — the broker rejects any other.
                redirectURI: "https://library.{{ .domain }}/auth/callback"
                # Home world for mark://<world>/<path> reads. `root` is the
                # curated hub: its /index.md is the front door and the
                # federation agent's hash index hangs under /index/.
                world: root
                scopes: mark.read
                cookieSecure: true

            ingress:
              enabled: true
              className: nginx
              host: library.{{ .domain }}
              tls:
                certManager:
                  enabled: true
                  issuerRef:
                    kind: ClusterIssuer
                    name: letsencrypt-prod

            # Chart default-on NetworkPolicy assumptions match this cluster:
            # inbound from ingress-nginx, egress DNS + TCP 443 (broker https)
            # + UDP 6309 (federation QUIC).
            networkPolicy:
              enabled: true
              ingressFromNamespace: ingress-nginx
              quicEgressPort: 6309
      destination:
        server: https://kubernetes.default.svc
        namespace: demarkus-library
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
          - ServerSideApply=true
