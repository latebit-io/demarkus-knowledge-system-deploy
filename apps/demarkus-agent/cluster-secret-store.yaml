# ESO Kubernetes-provider store + RBAC that lets the agent reuse root's
# chart-generated raw admin token as its hub-publish credential — without any
# manual seed, OpenBao entry, or out-of-band mint.
#
# Why this exists: publishing the federation index into `root` is a WRITE, so
# the agent needs a raw publish token for root. The demarkus-server chart
# already emits root's raw admin token in the `root-token-values` Secret
# (key `admin`, `emitRawValues: true` default) precisely for automation to
# consume. This store reads that Secret cross-namespace (root → agent) and
# external-secret.yaml reshapes it into the agent's client tokens.toml.
#
# Tradeoff (accepted): the agent SHARES root's admin publish token. That's
# fine — it is exactly a hub-publish credential, it stays publish-only (the
# worlds ApplicationSet pins operations: ["publish"]), and rotating root's
# token rotates the agent's too. The alternative (a dedicated token) is more
# manual: the chart provisions only one token per world, so a second token
# would have to be registered in root out-of-band.
#
# The kubernetes provider authenticates to the API as the dedicated
# `agent-token-reader` ServiceAccount below; ESO mints a short-lived token for
# it via TokenRequest. That SA is granted read on exactly one Secret in the
# `root` namespace — nothing else.
---
apiVersion: external-secrets.io/v1
kind: ClusterSecretStore
metadata:
  name: in-cluster-root
spec:
  provider:
    kubernetes:
      # Read Secrets from the `root` world's namespace.
      remoteNamespace: root
      server:
        url: https://kubernetes.default.svc
        # The kube API server's CA, published by kube-controller-manager into
        # the `kube-root-ca.crt` ConfigMap in every namespace. ESO runs in the
        # external-secrets namespace, so read it from there.
        caProvider:
          type: ConfigMap
          name: kube-root-ca.crt
          namespace: external-secrets
          key: ca.crt
      auth:
        serviceAccount:
          name: agent-token-reader
          namespace: demarkus-agent
---
# Dedicated least-privilege identity ESO impersonates for the read above.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: agent-token-reader
  namespace: demarkus-agent
---
# Grant that SA read on ONLY root-token-values, in the `root` namespace.
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: agent-token-reader
  namespace: root
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    resourceNames: ["root-token-values"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: agent-token-reader
  namespace: root
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: agent-token-reader
subjects:
  - kind: ServiceAccount
    name: agent-token-reader
    namespace: demarkus-agent
