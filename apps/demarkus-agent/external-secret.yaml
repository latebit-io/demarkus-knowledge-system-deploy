# Reshapes root's raw admin token (root-token-values:admin, read via the
# in-cluster-root store) into the client tokens.toml the demarkus-agent chart
# mounts at ~/.mark/tokens.toml. The agent consumes this via
# `tokens.existingSecret: demarkus-agent-hub-tokens` in application.yaml.
#
# The tokens.toml format is a TOML table per host (matching the agent chart's
# own secret.yaml renderer): a `["host:port"]` header then `token = "..."`.
# The host:port is the bare hub address WITHOUT the mark:// scheme, and must
# match the hub in config.hubs (root.root.svc.cluster.local:6309).
#
# refreshInterval: 1h — rotating root's token (e.g. a world re-bootstrap)
# propagates to the agent within the hour; the agent picks it up on its next
# crawl tick. ESO also materializes immediately on first creation, so once
# `root-token-values` exists the agent's token Secret appears without waiting
# a full interval.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: demarkus-agent-hub-tokens
  namespace: demarkus-agent
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: in-cluster-root
    kind: ClusterSecretStore
  target:
    name: demarkus-agent-hub-tokens
    creationPolicy: Owner
    # ESO v1 templating is the v2 Go-template engine by default (the old
    # `engine`/`engineVersion: v1` path is gone). The v1 CRD has no `engine`
    # field at all — setting it fails the ServerSideApply typed patch with
    # "field not declared in schema", so we rely on the default.
    template:
      data:
        tokens.toml: |
          ["root.root.svc.cluster.local:6309"]
          token = "{{ .admin }}"
  data:
    # kubernetes provider: remoteRef.key = Secret name in remoteNamespace,
    # property = the data key within it (root-token-values has key `admin`).
    - secretKey: admin
      remoteRef:
        key: root-token-values
        property: admin
