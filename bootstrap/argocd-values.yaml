# ArgoCD helm chart values for the knowledge-system reference deploy.
# Single-replica everything — no HA. Tunable per env.

global:
  # Fully-qualified domain comes online in Phase 5 once ingress + cert-manager
  # are wired. For now, ArgoCD is only reachable via kubectl port-forward.
  domain: argocd.knowledge.demarkus.io

# Server: HTTP only (TLS terminates at the ingress).
server:
  replicas: 1
  service:
    type: ClusterIP
  extraArgs:
    - --insecure
  # Admin ingress at argocd.knowledge.demarkus.io. ArgoCD now speaks
  # OIDC natively via Dex (see configs.cm.oidc.config below), so the
  # oauth2-proxy edge gate is dropped — keeping both would mean
  # double-GitHub-auth (oauth2-proxy AND Dex hit the same provider)
  # for a worse UX. oauth2-proxy stays installed for any future admin
  # host that doesn't speak OIDC natively.
  ingress:
    enabled: true
    ingressClassName: nginx
    hostname: argocd.knowledge.demarkus.io
    annotations:
      cert-manager.io/cluster-issuer: letsencrypt-prod
    tls: true

# Application controller: single shard, single replica.
controller:
  replicas: 1

# Repo server: single replica.
repoServer:
  replicas: 1

# ApplicationSet controller: single replica.
applicationSet:
  replicas: 1

# Redis: single replica, no HA, default chart image.
redis:
  enabled: true
redis-ha:
  enabled: false

# ArgoCD's bundled Dex stays disabled — we run a STANDALONE Dex
# (platform/dex/) that ArgoCD + OpenBao both consume as a shared OIDC
# identity provider. ArgoCD points at the standalone Dex via
# configs.cm.oidc.config below, not at its bundled copy.
dex:
  enabled: false

# Notifications: off for now to save resources; enable when there's a real
# downstream consumer (Slack, etc.).
notifications:
  enabled: false

configs:
  params:
    server.insecure: true
    # Delegate diff computation to the apiserver instead of ArgoCD's bundled
    # OpenAPI schema. Fixes "field not declared in schema" errors when the
    # live cluster has fields ArgoCD's bundled schema doesn't know about
    # (e.g. Deployment.status.terminatingReplicas added in k8s 1.33+).
    # https://argo-cd.readthedocs.io/en/stable/user-guide/diff-strategies/
    controller.diff.server.side: "true"
  cm:
    timeout.reconciliation: 60s
    # Allow ArgoCD to manage cluster-scoped resources without prompting.
    application.resourceTrackingMethod: annotation
    # OIDC config pointing at the standalone Dex (platform/dex/).
    # clientSecret references an ESO-materialized Secret named
    # `argocd-oidc-client` in the argocd namespace (see
    # platform/dex/argocd-oidc-client-secret.yaml). ArgoCD's parser
    # resolves `$<secretName>:<key>` against Secrets in its own
    # namespace at runtime; the value never lands in helm release
    # history.
    #
    # `groups` scope is requested so ArgoCD's RBAC (configs.rbac.csv,
    # not wired here yet) can map GitHub team membership claims to
    # ArgoCD roles. Without it, the id_token carries no group info.
    url: https://argocd.knowledge.demarkus.io
    oidc.config: |
      name: Dex
      issuer: https://dex.knowledge.demarkus.io
      clientID: argocd
      clientSecret: $argocd-oidc-client:client-secret
      requestedScopes:
        - openid
        - profile
        - email
        - groups
  # RBAC for OIDC-authed users. Without explicit policy, every Dex
  # login lands in a no-role state and the user sees zero apps —
  # ArgoCD's default for OIDC subjects is no grant (separate from the
  # built-in admin/password user, which always has full access).
  #
  # `scopes` tells ArgoCD which id_token claims to consult when
  # matching `g, <subject>, role:*` lines. We map by `email` (granted
  # via the email scope in oidc.config above) so the policy.csv reads
  # naturally. `groups` is included so future team-based mapping
  # (`g, latebit-io:admins, role:admin`) works without revisiting this
  # config.
  rbac:
    scopes: '[email,groups]'
    # role:admin is ArgoCD's built-in full-access role. Operators
    # added to this list see + manage every Application. Tighten to
    # a `latebit-io:admins` GitHub team when more than one operator
    # comes on (no policy edit needed — just add them to the team).
    policy.csv: |
      g, fritz@latebit.io, role:admin
      g, fredrick.seitz@gmail.com, role:admin
