# ─────────────────────────────────────────────────────────────────────────
# deployment.yaml — the single source of truth for this knowledge system's
# identity. ONE file, read by BOTH planes:
#
#   • OpenTofu  — via `yamldecode(file(...))` in tofu/envs/prod/locals.tf
#                 (uses: domain, projectId, region, repoURL)
#   • ArgoCD    — via the root ApplicationSet's git-files generator, which
#                 interpolates these fields into each app's manifests
#                 (uses: domain, projectId, githubOrg, oauthClientId,
#                  adminEmails, worlds)
#
# To stand up your own: change the values below. This is the ONLY place the
# deployment-specific identity lives — no more find/replace across manifests.
#
# NOT here (by design):
#   • Secrets (billing account, OAuth client *secret*, world tokens) — those
#     stay in gitignored terraform.tfvars / OpenBao. This file is committed
#     and world-readable, so only non-secret identity belongs here.
#   • The OpenTofu state bucket + bootstrap project — those configure the
#     `backend.tf` block, which OpenTofu evaluates *before* any variable, so
#     they can't come from here. They're set once, by hand, at bring-up.
# ─────────────────────────────────────────────────────────────────────────

# Public DNS subdomain delegated to this system's Cloud DNS zone. Drives every
# ingress host (broker.<domain>, knowledge.<domain>, argocd.<domain>, …) and
# the DNS zone itself. (tofu + ArgoCD)
domain: knowledge.demarkus.io

# GCP project id OpenTofu creates and everything runs in. Also threaded into
# the Workload-Identity SA annotations + OpenBao KMS seal. (tofu + ArgoCD)
projectId: knowledge-49722

# Default GCP region. The GKE zone is derived as "<region>-a". (tofu)
region: northamerica-northeast2

# Git URL of THIS repo (your fork). ArgoCD watches it; OpenTofu templates it
# into the root ApplicationSet at bring-up. (tofu + ArgoCD)
repoURL: https://github.com/latebit-io/demarkus-knowledge-system-deploy.git

# GitHub org whose membership gates the admin UIs (ArgoCD, OpenBao) via Dex. (ArgoCD)
githubOrg: latebit-io

# external-dns TXT-record ownership marker. Must be UNIQUE per cluster — if two
# installs share a DNS zone with the same id they'll fight over records. Do NOT
# change it on a running cluster (external-dns would stop recognising its own
# TXT records). Forks set their own. (ArgoCD)
dnsTxtOwnerId: knowledge-demarkus

# Google OAuth *client id* for broker user login. Public identifier (the
# matching secret lives in OpenBao). (ArgoCD)
oauthClientId: 941447371620-ihfmbrgip3dlaunqaa7e8675uoh6fs7v.apps.googleusercontent.com

# Admin allowlist — broker world-mint allowlist + ArgoCD admin RBAC. (ArgoCD)
adminEmails:
  - fritz@latebit.io
  - fredrick.seitz@gmail.com

# Broker-global OIDC domain allowlist — gates login at every auth surface
# (callback, /oauth/authorize, device flow) on the Google `hd` claim. Empty list
# leaves the gate open (any verified Google account). The gate matches `hd`,
# not the email domain: `hd` is set server-side from the Workspace tenant and
# is spoof-resistant (cf. unverified secondary emails on a consumer account),
# and consumer Gmail accounts have no `hd` so they are rejected when this list
# is non-empty. Google's `hd` authorize-param is single-valued, so multi-domain
# support is enforced broker-side against the returned claim. (ArgoCD)
allowDomains:
  - latebit.io
  - nesto.ca
  - nestocloud.ca

# Confidential OAuth web clients (RFC 6749 §2.1) registered with the broker —
# server-side web apps (e.g. a library reading room) that authenticate with a
# client secret and receive the authorization-code redirect at a real https
# URL instead of a native-app loopback. Operator-curated registry, NOT open
# dynamic registration; native/CLI agents (Claude Code MCP, demarkus-join)
# never appear here. Each entry must set ALL FOUR keys — clientID,
# clientSecretHash, redirectURIs, name (name may be "") — the broker
# ApplicationSet renders with missingkey=error, so an absent key fails the
# render instead of shipping a half-registered client. clientSecretHash is
# the sha256-hex of the secret (`printf '%s' "$SECRET" | sha256sum`), not
# secret material; the plaintext lives only in the web app's own deployment.
# redirectURIs is an exact-match https allowlist — no wildcards, no loopback.
# Deregistering a client invalidates its bound refresh tokens at the refresh
# gate. See docs/runbook-broker-web-clients.md. (ArgoCD)
webClients:
  - clientID: library-web
    clientSecretHash: "e44adb5ad483c19ce9915d599aebee99439e1e824010983c4c4c61c02d0c757a"
    # In-cluster library ingress (apps/demarkus-library). Must exactly match
    # the chart's library.broker.redirectURI — both derive from `domain`
    # (library.<domain>), so they move together.
    redirectURIs:
      - https://library.knowledge.demarkus.io/auth/callback
    name: Universe Library

# The worlds in this knowledge system. ONE list — drives the worlds
# ApplicationSet (one server per entry), the broker's worlds[], and the
# federation agent's crawl seeds. `hub: true` marks the fixed-name discovery
# hub: the agent publishes its index there and does NOT crawl it; every other
# world is a content world the agent crawls. (ArgoCD)
worlds:
  - name: root
    hub: true
  - name: world-a
