# Dex config ExternalSecret, config-driven from deployment.yaml.
#
# The ExternalSecret's config.yaml mixes deployment values (domain, githubOrg)
# with ESO's own `{{ }}` secret placeholders, so it can't be a plain raw
# manifest. It lives in a LOCAL chart (./dex-config) that helm-renders the
# deployment values while emitting the ESO placeholders literally; this
# multi-source Application feeds the chart the repo-root deployment.yaml as a
# values file ($values).
#
# Both repoURLs are the self-reference; scripts/sync-deployment-config.sh keeps
# them in sync with deployment.yaml's repoURL. The ./dex-config subdir is not
# rendered by the platform/* directory generator (non-recursive).
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: dex-config
  namespace: argocd
  annotations:
    # Wave -1, alongside the Dex Application: this creates the dex-config
    # ExternalSecret early, so it's queued by the time ESO (wave 0) comes up to
    # materialize the dex-config Secret — minimising Dex's first-install
    # crash-loop while it waits for its config. (The old raw external-secret
    # had no wave, i.e. effective wave 0; this is a small ordering improvement.)
    argocd.argoproj.io/sync-wave: "-1"
spec:
  project: default
  sources:
    - repoURL: https://github.com/latebit-io/demarkus-knowledge-system-deploy.git
      targetRevision: main
      path: platform/dex/dex-config
      helm:
        valueFiles:
          - $values/deployment.yaml
    # ref-only source: provides $values pointing at the repo root.
    - repoURL: https://github.com/latebit-io/demarkus-knowledge-system-deploy.git
      targetRevision: main
      ref: values
  destination:
    server: https://kubernetes.default.svc
    namespace: dex
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
      - SkipDryRunOnMissingResource=true
