{{- $o := "{{" -}}
{{- $c := "}}" -}}
{{- $domain := required "deployment.yaml: domain is required" .Values.domain -}}
{{- $org := required "deployment.yaml: githubOrg is required" .Values.githubOrg -}}
# Dex's config.yaml, rendered server-side by ESO from OpenBao values.
#
# Why ESO renders the config (not the chart): Dex 2.45.0 does not expand `$VAR`
# references in its config file at startup, so client secrets must be baked into
# the rendered Secret rather than passed as env. ESO's Sprig-flavored Go
# template substitutes the OpenBao-sourced values directly. The Dex chart's
# configSecret.create=false + existingSecret=dex-config (see the dex
# ApplicationSet) mounts this Secret as the config.
#
# Two templating layers meet here: HELM renders `domain` + `githubOrg` from
# deployment.yaml at GitOps time; the $o/$c escapes (which hold the open/close
# double-brace) emit ESO's own secret placeholders LITERALLY so ESO substitutes
# the OpenBao values at materialization time.
#
# Rotation: `bao kv put` any of the three source paths and force-sync this
# ExternalSecret; restart the Dex pod (it reads config.yaml only at startup).
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: dex-config
  namespace: dex
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: openbao
    kind: ClusterSecretStore
  target:
    name: dex-config
    creationPolicy: Owner
    template:
      type: Opaque
      data:
        config.yaml: |
          issuer: https://dex.{{ $domain }}

          storage:
            type: kubernetes
            config:
              inCluster: true

          web:
            http: 0.0.0.0:5556

          connectors:
            - type: github
              id: github
              name: GitHub
              config:
                clientID: "{{ $o }} .github_client_id {{ $c }}"
                clientSecret: "{{ $o }} .github_client_secret {{ $c }}"
                redirectURI: https://dex.{{ $domain }}/callback
                orgs:
                  - name: {{ $org }}
                loadAllGroups: true
                teamNameField: both
                useLoginAsID: false

          staticClients:
            - id: argocd
              name: ArgoCD
              secret: "{{ $o }} .argocd_client_secret {{ $c }}"
              redirectURIs:
                - https://argocd.{{ $domain }}/auth/callback
            - id: openbao
              name: OpenBao
              secret: "{{ $o }} .openbao_client_secret {{ $c }}"
              redirectURIs:
                - https://openbao.{{ $domain }}/ui/vault/auth/oidc/oidc/callback
                - http://localhost:8250/oidc/callback

          oauth2:
            skipApprovalScreen: true
            alwaysShowLoginScreen: false

          expiry:
            idTokens: 24h
            signingKeys: 6h
            refreshTokens:
              validIfNotUsedFor: 720h
              absoluteLifetime: 720h
  data:
    - secretKey: github_client_id
      remoteRef:
        key: dex/github-client
        property: client_id
    - secretKey: github_client_secret
      remoteRef:
        key: dex/github-client
        property: client_secret
    - secretKey: argocd_client_secret
      remoteRef:
        key: dex/argocd-client
        property: client_secret
    - secretKey: openbao_client_secret
      remoteRef:
        key: dex/openbao-client
        property: client_secret
