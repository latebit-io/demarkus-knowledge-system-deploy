# Dex credentials bundle: GitHub OAuth App + static client secrets for
# ArgoCD and OpenBao. Materialized from OpenBao via ESO (Phase 7b
# bridge). One Secret with four env-var-shaped keys so the Dex chart's
# envFrom can load it as a single block.
#
# OpenBao source paths (kv-v2):
#   - secret/dex/github-client   (fields: client_id, client_secret)
#   - secret/dex/argocd-client   (field:  client_secret)
#   - secret/dex/openbao-client  (field:  client_secret)
#
# k8s Secret keys match the env-var names Dex's config template
# references ($GITHUB_CLIENT_ID, etc.).
#
# Refresh: 1h. To force after rotation:
#   kubectl -n dex annotate externalsecret dex-credentials \
#     force-sync=$(date +%s) --overwrite
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: dex-credentials
  namespace: dex
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: openbao
    kind: ClusterSecretStore
  target:
    name: dex-credentials
    creationPolicy: Owner
  data:
    - secretKey: GITHUB_CLIENT_ID
      remoteRef:
        key: dex/github-client
        property: client_id
    - secretKey: GITHUB_CLIENT_SECRET
      remoteRef:
        key: dex/github-client
        property: client_secret
    - secretKey: ARGOCD_CLIENT_SECRET
      remoteRef:
        key: dex/argocd-client
        property: client_secret
    - secretKey: OPENBAO_CLIENT_SECRET
      remoteRef:
        key: dex/openbao-client
        property: client_secret
