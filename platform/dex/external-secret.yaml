# Dex's config.yaml, rendered server-side by ESO from OpenBao values.
#
# Why ESO renders the config (not the chart): Dex 2.45.0 does not
# expand `$VAR` references in its config file at startup
# (cmd/dex/serve.go reads the YAML and parses directly, no
# `os.ExpandEnv` pass). The chart's `configSecret` template ships the
# YAML verbatim from helm values, so `secret: $ARGOCD_CLIENT_SECRET`
# ended up as a literal string in Dex's static-client store — every
# token-exchange from ArgoCD failed with `invalid_client` because
# Dex was comparing the literal `$ARGOCD_CLIENT_SECRET` against the
# actual byte value ArgoCD presented.
#
# Fix: render the whole config.yaml here via ESO's templating. ESO's
# Sprig-flavored Go template engine substitutes the OpenBao-sourced
# values directly into the rendered Secret. The Dex chart's
# `configSecret.create=false` + `configSecret.existingSecret=dex-config`
# (set in application.yaml) skips the chart's own rendering and mounts
# this Secret instead. Dex sees a fully-baked config; no env
# substitution required.
#
# Rotation: bao kv put any of the three source paths and force-sync
# this ExternalSecret. Dex pod needs a restart after the Secret
# refreshes (kubelet mounted-volume sync picks up the change but
# Dex only reads config.yaml at startup).
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: dex-config
  namespace: dex
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: openbao
    kind: ClusterSecretStore
  target:
    name: dex-config
    creationPolicy: Owner
    template:
      type: Opaque
      data:
        config.yaml: |
          issuer: https://dex.knowledge.demarkus.io

          storage:
            type: kubernetes
            config:
              inCluster: true

          web:
            http: 0.0.0.0:5556

          connectors:
            - type: github
              id: github
              name: GitHub
              config:
                clientID: "{{ .github_client_id }}"
                clientSecret: "{{ .github_client_secret }}"
                redirectURI: https://dex.knowledge.demarkus.io/callback
                orgs:
                  - name: latebit-io
                loadAllGroups: true
                teamNameField: both
                useLoginAsID: false

          staticClients:
            - id: argocd
              name: ArgoCD
              secret: "{{ .argocd_client_secret }}"
              redirectURIs:
                - https://argocd.knowledge.demarkus.io/auth/callback
            - id: openbao
              name: OpenBao
              secret: "{{ .openbao_client_secret }}"
              redirectURIs:
                - https://openbao.knowledge.demarkus.io/ui/vault/auth/oidc/oidc/callback
                - http://localhost:8250/oidc/callback

          oauth2:
            skipApprovalScreen: true
            alwaysShowLoginScreen: false

          expiry:
            idTokens: 24h
            signingKeys: 6h
            refreshTokens:
              validIfNotUsedFor: 720h
              absoluteLifetime: 720h
  data:
    - secretKey: github_client_id
      remoteRef:
        key: dex/github-client
        property: client_id
    - secretKey: github_client_secret
      remoteRef:
        key: dex/github-client
        property: client_secret
    - secretKey: argocd_client_secret
      remoteRef:
        key: dex/argocd-client
        property: client_secret
    - secretKey: openbao_client_secret
      remoteRef:
        key: dex/openbao-client
        property: client_secret
