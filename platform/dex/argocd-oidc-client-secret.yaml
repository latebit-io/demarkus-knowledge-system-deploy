# ArgoCD's OIDC client secret, materialized into the argocd namespace
# so the argocd-cm config reference `$argocd-oidc-client:client-secret`
# resolves at startup.
#
# Lives in `platform/dex/` (not `bootstrap/`) because:
#   1. ArgoCD's own bootstrap is tofu-managed and runs before Argo
#      itself; ExternalSecrets need ESO which is sync-wave -1 in this
#      cluster — chicken-and-egg.
#   2. The Argo wrapper Application for `platform/dex` deploys this
#      manifest along with the rest of Dex, and respects the explicit
#      metadata.namespace (argocd) — the platform ApplicationSet's
#      destination namespace defaults to the path basename only when
#      manifests don't declare one.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: argocd-oidc-client
  namespace: argocd
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: openbao
    kind: ClusterSecretStore
  target:
    name: argocd-oidc-client
    creationPolicy: Owner
    # ArgoCD only honors `$<secretName>:<key>` references in
    # argocd-cm for Secrets that carry the label
    # `app.kubernetes.io/part-of: argocd` — a defense-in-depth
    # filter against argocd-cm accidentally reading credentials
    # out of unrelated Secrets that happen to share the same
    # namespace. ESO doesn't set this label by default, so the
    # materialized argocd-oidc-client Secret needs the label
    # explicitly added via target.template.
    template:
      metadata:
        labels:
          app.kubernetes.io/part-of: argocd
  data:
    # argocd-cm's oidc.config block references this key via
    # `clientSecret: $argocd-oidc-client:client-secret`. Hyphen vs
    # underscore matters — ArgoCD parses on hyphen.
    - secretKey: client-secret
      remoteRef:
        key: dex/argocd-client
        property: client_secret
