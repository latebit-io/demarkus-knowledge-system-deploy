{{- $acmeEmail := .Values.adminEmails | first -}}
{{- if not $acmeEmail }}{{ fail "deployment.yaml: adminEmails must have at least one entry — its first address is the ACME registration email" }}{{- end }}
# Let's Encrypt ClusterIssuers. Cluster-scoped so any namespace can request
# certs by name. Sync-wave -1 so they're applied after the inner cert-manager
# Application (wave -2) — they'll error initially until cert-manager pods are
# up and CRDs exist; self-heal converges in a few minutes.
#
# ACME registration email comes from deployment.yaml's adminEmails[0].
# Use letsencrypt-staging while validating ingress/DNS — LE rate-limits prod
# heavily on repeated failures.
---
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-staging
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
    # Skip Argo's pre-sync server-side dry-run; the CRD doesn't exist until
    # cert-manager (wave -2) installs it, but the actual apply runs after.
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  acme:
    server: https://acme-staging-v02.api.letsencrypt.org/directory
    email: {{ $acmeEmail }}
    privateKeySecretRef:
      name: letsencrypt-staging-account-key
    solvers:
      - http01:
          ingress:
            ingressClassName: nginx
---
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-prod
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
    # Skip Argo's pre-sync server-side dry-run; the CRD doesn't exist until
    # cert-manager (wave -2) installs it, but the actual apply runs after.
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  acme:
    server: https://acme-v02.api.letsencrypt.org/directory
    email: {{ $acmeEmail }}
    privateKeySecretRef:
      name: letsencrypt-prod-account-key
    solvers:
      - http01:
          ingress:
            ingressClassName: nginx
---
# Self-signed issuer for internal cluster DNS names (.svc, .cluster.local)
# that Let's Encrypt cannot validate. Used by OpenBao TLS scaffold (Phase 5e)
# and any future internal mTLS work. Consumers must skip-verify or be
# pre-loaded with the issued CA cert.
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: selfsigned
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  selfSigned: {}
