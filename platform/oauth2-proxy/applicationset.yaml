# oauth2-proxy: GitHub OAuth gate for admin surfaces (argocd + openbao
# admin UIs, and any future admin host under *.<domain>).
#
# Config-driven: this ApplicationSet's git-files generator reads the repo-root
# deployment.yaml and interpolates `domain` (auth host + cookie/whitelist
# domains) and `githubOrg` (the membership gate) into the chart values.
#
# Topology — centralized:
#   - oauth2-proxy runs as a single replica at auth.<domain>
#   - Other ingresses point at it via `auth-url` annotation
#   - Cookie scoped to `.<domain>` so a single GitHub login covers every
#     protected subdomain (one trip through the OAuth dance, not one per UI)
#
# Authorization: GitHub org membership in deployment.yaml's `githubOrg`.
# Tightening to a specific team is a future change (add `--github-team=<slug>`).
#
# Sync wave: -1 (alongside the other platform secrets/networking infra the
# admin ingresses depend on).
#
# ────────────────────────────────────────────────────────────────────────
# ONE-TIME OPERATOR WIRING (after the generated Application is Synced+Healthy):
#   1. Create a GitHub OAuth App (org settings if you want it under the
#      org account, or personal settings):
#        Authorization callback URL: https://auth.<domain>/oauth2/callback
#   2. Seed OpenBao at secret/oauth2-proxy/github-client with three keys:
#        client_id      = <from GitHub OAuth App>
#        client_secret  = <from GitHub OAuth App>
#        cookie_secret  = $(openssl rand -base64 32 | tr -d '=' | tr -- '+/' '-_')
#   3. Extend the `external-secrets` OpenBao policy to allow read on
#      secret/data/oauth2-proxy/* (see docs/runbook-eso-openbao.md §Step 1).
#
# Full operator runbook: docs/runbook-oauth2-proxy.md.
# ────────────────────────────────────────────────────────────────────────
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: oauth2-proxy
  namespace: argocd
spec:
  goTemplate: true
  goTemplateOptions: ["missingkey=error"]
  generators:
    - git:
        # Self-reference literal (a generator can't read its own repo URL from
        # the file it reads); same value as deployment.yaml's repoURL.
        repoURL: https://github.com/latebit-io/demarkus-knowledge-system-deploy.git
        revision: main
        files:
          - path: deployment.yaml
  template:
    metadata:
      name: oauth2-proxy
      namespace: argocd
      annotations:
        argocd.argoproj.io/sync-wave: "-1"
    spec:
      project: default
      source:
        repoURL: https://oauth2-proxy.github.io/manifests
        chart: oauth2-proxy
        targetRevision: 10.6.0
        helm:
          releaseName: oauth2-proxy
          values: |
            # Pin image tag to the chart's appVersion. Bumping chart bumps
            # this in lockstep; an out-of-band image bump can't slip in.
            image:
              tag: v7.10.0

            replicaCount: 1

            # GitHub OAuth provider. Authorization gate: must be a verified
            # member of the configured GitHub org.
            config:
              # client-id / client-secret / cookie-secret come from the
              # ESO-materialized github-client Secret (see external-secret.yaml).
              existingSecret: github-client
              configFile: |-
                provider = "github"
                email_domains = ["*"]
                github_org = "{{ .githubOrg }}"
                # Cookie scoped to the parent domain so a single GitHub
                # session covers argocd.*, openbao.*, and any future admin
                # subdomain. Cookie attributes are production-safe by
                # default (Secure, HttpOnly, SameSite=lax).
                cookie_domains = [".{{ .domain }}"]
                # whitelist_domains lets oauth2-proxy redirect to any of our
                # admin hosts after a successful login. Without this, the rd=
                # parameter from /oauth2/start is rejected as cross-domain.
                whitelist_domains = [".{{ .domain }}"]
                # auth-url backend mode — return 202/401 instead of redirecting
                # so ingress-nginx's auth_request module can chain to
                # /oauth2/start.
                reverse_proxy = true
                # Trust X-Forwarded-* headers from ingress-nginx so the OAuth
                # state cookie's Secure attribute survives the proxy hop.
                real_client_ip_header = "X-Forwarded-For"
                # Skip the default "click to authenticate" interstitial — the
                # GitHub OAuth screen is already a consent UI.
                skip_provider_button = true

            # Ingress at auth.<domain>. cert-manager issues the TLS cert from
            # letsencrypt-prod; external-dns creates the A record.
            #
            # The chart's ingress schema uses `hosts:` (a list) not `hostname:`
            # — getting this wrong silently skips rendering the Ingress (no
            # template error; the conditional just falls through).
            ingress:
              enabled: true
              className: nginx
              path: /
              pathType: Prefix
              hosts:
                - auth.{{ .domain }}
              annotations:
                cert-manager.io/cluster-issuer: letsencrypt-prod
              tls:
                - hosts:
                    - auth.{{ .domain }}
                  secretName: oauth2-proxy-tls

            # Modest resource footprint — oauth2-proxy is stateless and the
            # cookie session is verified per request with no backend storage.
            resources:
              requests:
                cpu: 25m
                memory: 64Mi
              limits:
                memory: 128Mi

            serviceAccount:
              create: true
              name: oauth2-proxy

            # Disable the chart's bundled redis (cookie session is fine for a
            # single-replica admin gate).
            sessionStorage:
              type: cookie
      destination:
        server: https://kubernetes.default.svc
        namespace: oauth2-proxy
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
          - ServerSideApply=true
