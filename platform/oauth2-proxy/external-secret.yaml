# GitHub OAuth credentials for oauth2-proxy. Materialized from OpenBao
# via the cluster-scoped `openbao` ClusterSecretStore (defined in
# apps/demarkus-broker/cluster-secret-store.yaml).
#
# OpenBao source path: secret/oauth2-proxy/github-client
# Required fields:
#   - client_id     (GitHub OAuth App's Client ID)
#   - client_secret (GitHub OAuth App's Client Secret)
#   - cookie_secret (32-byte random for cookie encryption — generate
#                    with `openssl rand -base64 32 | tr -d '=' | tr -- '+/' '-_'`)
#
# k8s Secret keys match the oauth2-proxy chart's `existingSecret` shape:
# the chart expects `client-id`, `client-secret`, `cookie-secret`
# (hyphenated). Property mapping converts the OpenBao underscored names.
#
# Refresh: 1h. Same posture as broker secrets — rotation propagates
# within an hour, or force-sync via:
#   kubectl -n oauth2-proxy annotate externalsecret github-client \
#     force-sync=$(date +%s) --overwrite
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: github-client
  namespace: oauth2-proxy
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: openbao
    kind: ClusterSecretStore
  target:
    name: github-client
    creationPolicy: Owner
  data:
    - secretKey: client-id
      remoteRef:
        key: oauth2-proxy/github-client
        property: client_id
    - secretKey: client-secret
      remoteRef:
        key: oauth2-proxy/github-client
        property: client_secret
    - secretKey: cookie-secret
      remoteRef:
        key: oauth2-proxy/github-client
        property: cookie_secret
