# oauth2-proxy: GitHub OAuth gate for admin surfaces (argocd + openbao
# admin UIs, and any future admin host under *.knowledge.demarkus.io).
#
# Topology — centralized:
#   - oauth2-proxy runs as a single replica at auth.knowledge.demarkus.io
#   - Other ingresses point at it via `auth-url` annotation
#   - Cookie scoped to `.knowledge.demarkus.io` so a single GitHub login
#     covers every protected subdomain (one trip through the OAuth dance,
#     not one per UI)
#
# Authorization: GitHub org membership in `latebit-io`. Tightening to a
# specific team is a future change (add `--github-team=<slug>` to
# extraArgs). Loosening to single-user is also feasible by removing the
# --github-org flag and adding --authenticated-emails-file or
# --email-domain.
#
# Sync wave: -1 (alongside the other platform secrets/networking infra
# the admin ingresses depend on). The auth host's TLS cert from
# cert-manager and DNS record from external-dns land automatically once
# the ingress reconciles.
#
# ────────────────────────────────────────────────────────────────────────
# ONE-TIME OPERATOR WIRING (after this Application is Synced+Healthy):
#   1. Create a GitHub OAuth App (org settings if you want it under the
#      org account, or personal settings):
#        Authorization callback URL: https://auth.knowledge.demarkus.io/oauth2/callback
#   2. Seed OpenBao at secret/oauth2-proxy/github-client with three keys:
#        client_id      = <from GitHub OAuth App>
#        client_secret  = <from GitHub OAuth App>
#        cookie_secret  = $(openssl rand -base64 32 | tr -d '=' | tr -- '+/' '-_')
#   3. Extend the `external-secrets` OpenBao policy to allow read on
#      secret/data/oauth2-proxy/* (see docs/runbook-eso-openbao.md §Step 1).
#
# Full operator runbook: docs/runbook-oauth2-proxy.md.
# ────────────────────────────────────────────────────────────────────────
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: oauth2-proxy
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
spec:
  project: default
  source:
    repoURL: https://oauth2-proxy.github.io/manifests
    chart: oauth2-proxy
    targetRevision: 10.6.0
    helm:
      releaseName: oauth2-proxy
      values: |
        # Pin image tag to the chart's appVersion. Bumping chart bumps
        # this in lockstep; an out-of-band image bump can't slip in.
        image:
          tag: v7.10.0

        replicaCount: 1

        # GitHub OAuth provider. The chart's extraArgs are passed
        # straight to the oauth2-proxy binary; see
        # https://oauth2-proxy.github.io/oauth2-proxy/configuration/overview
        # for the full list. Authorization gate: must be a verified
        # member of the latebit-io GitHub org.
        config:
          # client-id / client-secret / cookie-secret come from the
          # ESO-materialized github-client Secret (see external-
          # secret.yaml). The chart reads them at startup via the
          # standard envFrom path; no values land in helm release
          # history.
          existingSecret: github-client
          configFile: |-
            provider = "github"
            email_domains = ["*"]
            github_org = "latebit-io"
            # Cookie scoped to the parent domain so a single GitHub
            # session covers argocd.*, openbao.*, and any future admin
            # subdomain. Cookie attributes are production-safe by
            # default (Secure, HttpOnly, SameSite=lax).
            cookie_domains = [".knowledge.demarkus.io"]
            # whitelist_domains lets oauth2-proxy redirect to any of
            # our admin hosts after a successful login. Without this,
            # the rd= parameter from /oauth2/start is rejected as a
            # cross-domain redirect.
            whitelist_domains = [".knowledge.demarkus.io"]
            # auth-url backend mode — return 202/401 instead of redirecting
            # so ingress-nginx's auth_request module can chain to
            # /oauth2/start. The chart sets reverse_proxy = true by
            # default; leave it.
            reverse_proxy = true
            # Trust X-Forwarded-* headers from ingress-nginx so the
            # OAuth state cookie's Secure attribute survives the proxy
            # hop. ingress-nginx strips spoofed XFF and appends the
            # real client IP in this cluster (see broker's
            # rateLimit.trustForwardedFor comment for the same
            # invariant).
            real_client_ip_header = "X-Forwarded-For"
            # Skip the default "click to authenticate" interstitial.
            # The GitHub OAuth screen is already a consent UI; the
            # double-confirm has no value for an admin tool.
            skip_provider_button = true

        # Ingress at auth.knowledge.demarkus.io. cert-manager issues
        # the TLS cert from letsencrypt-prod; external-dns creates the
        # A record from the ingress host.
        #
        # The chart's ingress schema uses `hosts:` (a list) rather than
        # the more common `hostname:` (singular) — getting this wrong
        # silently skips rendering the Ingress entirely (no template
        # error; the conditional just falls through). Initial values
        # used `hostname:` and produced no Ingress at all, leaving
        # nginx-ingress's auth subrequest unable to resolve
        # auth.knowledge.demarkus.io and returning 500 to admin-host
        # visitors.
        ingress:
          enabled: true
          className: nginx
          path: /
          pathType: Prefix
          hosts:
            - auth.knowledge.demarkus.io
          annotations:
            cert-manager.io/cluster-issuer: letsencrypt-prod
          tls:
            - hosts:
                - auth.knowledge.demarkus.io
              secretName: oauth2-proxy-tls

        # Modest resource footprint — oauth2-proxy is stateless and the
        # cookie session is verified per request with no backend storage.
        resources:
          requests:
            cpu: 25m
            memory: 64Mi
          limits:
            memory: 128Mi

        serviceAccount:
          create: true
          name: oauth2-proxy

        # Disable the chart's bundled redis (we don't need session
        # storage; oauth2-proxy's default in-memory cookie session is
        # fine for a single-replica admin gate).
        sessionStorage:
          type: cookie
  destination:
    server: https://kubernetes.default.svc
    namespace: oauth2-proxy
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
